# Chroma 向量数据库配置

# 数据库配置
collection_name: agent               # 向量集合名称
persist_directory: chroma_db         # 向量数据库持久化目录
k: 3                                # 检索时返回的最相似文档数量

# 数据源配置
data_path: data                      # 知识库源文件目录
md5_hex_store: md5.text              # 文件 MD5 校验记录文件，用于检测文件是否变更
allow_knowledge_file_type: ["txt", "pdf"]  # 允许导入的知识库文件类型

# 文档分块配置
chunk_size: 200                      # 每个文本块的最大字符数
chunk_overlap: 20                    # 相邻文本块之间的重叠字符数
separator: ["\n\n", "\n", ".", "!", "?", "。", "！", "？", " ", ""]  # 文本分割优先级顺序
